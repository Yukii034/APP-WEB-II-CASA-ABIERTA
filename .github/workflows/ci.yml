name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - medicamentos
          - gateway
          - alimentacion
          - informacion-salud
          - estado-animo
          - citas
          - reportes
          - contacto-emergencia
          - reportes-medicos
          - recordatorios-medicamentos
          - actividad-fisica
          # agregar aquí cada nuevo microservicio SOLO cuando ya exista
          # su carpeta en services/, si no, el CI falla

    defaults:
      run:
        working-directory: ./services/${{ matrix.service }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: Descargar dependencias
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./... -v

  all-checks-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    steps:
      - name: Verificar resultado de la matrix
        run: |
          if [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "Algún servicio falló el build/vet/test"
            exit 1
          fi
          echo "Todos los servicios pasaron correctamente"