services:

  # Ejemplo de microservicio (cada equipo agrega el suyo copiando este bloque)
  medicamentos:
    build: ./services/medicamentos
    environment:
      - PORT=8080
    networks:
      - cuidabien-net
    # No necesita "ports" hacia afuera si solo lo usa el gateway,
    # pero lo dejamos expuesto para poder probarlo directo mientras desarrollan
    ports:
      - "8081:8080"

  alimentacion:
    build: ./services/alimentacion
    environment:
      - PORT=8080
    networks:
      - cuidabien-net
    # No necesita "ports" hacia afuera si solo lo usa el gateway,
    # pero lo dejamos expuesto para poder probarlo directo mientras desarrollan
    ports:
      - "8084:8080"

  citas:
    build: ./services/citas
    environment:
      - PORT=8080
    networks:
      - cuidabien-net
    ports:
      - "8085:8080"

  estado-animo:
    build: ./services/estado-animo
    environment:
      - PORT=8080
    networks:
      - cuidabien-net
    ports:
      - "8086:8080"

  gateway:
    build: ./services/gateway
    environment:
      - PORT=8080
      - MEDICAMENTOS_URL=http://medicamentos:8080
      - CITAS_URL=http://citas:8080
      - ESTADO_ANIMO_URL=http://estado-animo:8080
      # Aquí se van agregando las URLs de los demás servicios:
      # - EMERGENCIA_URL=http://emergencia:8080
      # - MONITOREO_URL=http://monitoreo:8080
    depends_on:
      - medicamentos
      - citas
      - estado-animo
    networks:
      - cuidabien-net
    ports:
      - "8080:8080"

networks:
  cuidabien-net:
    driver: bridge