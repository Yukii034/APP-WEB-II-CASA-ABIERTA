services:

  # Ejemplo de microservicio (cada equipo agrega el suyo copiando este bloque)
  medicamentos:
    build: ./services/medicamentos
    environment:
      - PORT=8080
    networks:
      - cuidabien-net
    # No necesita "ports" hacia afuera si solo lo usa el gateway,
    # pero lo dejamos expuesto para poder probarlo directo mientras desarrollan
    ports:
      - "8081:8080"

  alimentacion:
    build: ./services/alimentacion
    environment:
      - PORT=8080
    networks:
      - cuidabien-net
    # No necesita "ports" hacia afuera si solo lo usa el gateway,
    # pero lo dejamos expuesto para poder probarlo directo mientras desarrollan
    ports:
      - "8084:8080"

  informacion-salud:
    build: ./services/informacion-salud
    environment:
      - PORT=8080
    networks:
      - cuidabien-net
    ports:
      - "8082:8080"

  citas:
    build: ./services/citas
    environment:
      - PORT=8080
      - INFORMACION_SALUD_URL=http://informacion-salud:8080
    networks:
      - cuidabien-net
    depends_on:
      - informacion-salud
    ports:
      - "8085:8080"

